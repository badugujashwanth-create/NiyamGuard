services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niyamguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d niyamguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      APP_ENV: development
      DEBUG: "false"
      DEMO_MODE: "true"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/niyamguard
      SECRET_KEY: local-compose-demo-only
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      TRUSTED_HOSTS: localhost,127.0.0.1,backend
      SEED_DEMO_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
