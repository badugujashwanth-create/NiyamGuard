# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
services:
  - type: web
    name: niyamguard-sandbox-jashwanth
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile.fullstack
    dockerContext: .
    healthCheckPath: /api/integration/health
    envVars:
      - key: APP_ENV
        value: staging
      - key: DEBUG
        value: "false"
      - key: DEMO_MODE
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: niyamguard-db-jashwanth
          property: connectionString
      - key: TRUSTED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ORIGINS
        value: https://niyamguard-sandbox-jashwanth.onrender.com
      - key: SEED_DEMO_ON_STARTUP
        value: "true"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: AI_ENABLED
        value: "false"
      - key: ENABLE_EDGE_TTS
        value: "false"

databases:
  - name: niyamguard-db-jashwanth
    plan: free
    region: singapore
    postgresMajorVersion: "18"
    databaseName: niyamguard
    user: niyamguard
    ipAllowList: []
